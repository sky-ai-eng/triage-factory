name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  checks: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3333449
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}

      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-document: "https://github.com/sky-ai-eng/todo-triage/blob/main/docs/CLA.md"
          path-to-signatures: "signatures/cla.json"
          branch: "cla-signatures"
          allowlist: "AidanAllchin,dependabot[bot],github-actions[bot],claude[bot]"
